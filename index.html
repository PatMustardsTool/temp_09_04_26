<!Doctype html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>My_Website</title>
    <!-- Links CSS file for styling -->
    <link rel='stylesheet' href='index.css'>
</head>
<body>
    <form>
        <div id='my_header_row'>
            <img id='my_logo' src='my_images/logo.jpg' alt='logo'>
            <span id='my_header'>Test</span>
            <img id='my_reset_icon' class='icon' src='my_images/reset.svg' alt='reset'>
        </div>
        <div class='class_row'>
            <label for='my_text_input'>Text:</label><input type='text' id='my_text_input'>
            <label for='my_number_input'>Number:</label><input type='number' id='my_number_input'>
        </div>
        <div class='class_row'>
            <label for='my_checkbox_input'>Checkbox:</label><input type='checkbox' id='my_checkbox_input'>
        </div>
        <div class='class_row'>
            <label for='my_radio_1_input'>Radio 1:</label><input type='radio' id='my_radio_1_input' value='Radio 1' name='radio_group'>
            <label for='my_radio_2_input'>Radio 2:</label><input type='radio' id='my_radio_2_input' value='Radio 2' name='radio_group'>
            <label for='my_radio_3_input'>Radio 3:</label><input type='radio' id='my_radio_3_input' value='Radio 3' name='radio_group'>
        </div>
        <div class='class_row'>
            <button id='my_submit_button' type='button'>Submit</button>
        </div>
        <div class='class_row'>
            <table id='my_result_table'></table>
        </div>
        <div class='class_timestamp_row'>
            <span id='my_timestamp'>12/04/2026 19:41</span>
        </div>
    </form>

    <!-- Links JavaScript file for behavior -->
    <script type='module' src='index.js'></script>
</body>
</html>
