<svg xmlns='http://www.w3.org/2000/svg' width='" & Self.Width & "' height='" & Self.Height & "' viewBox='0 0 24 24'>
	<style>
		.main" & my_reload_image_animation & "
		{
		animation-name: main;
		animation-duration:" & If(Len(my_reload_image_animation) = 0, "0ms", "500ms") & ";
		animation-fill-mode: both;
		transform-origin: 50% 50%;
		}
		@keyframes main
		{
		0% {transform: rotate(0deg);}
		100% {transform: rotate(360deg);}
		}
	</style>
	<g transform='rotate(270 12 12)' fill='none' stroke='" & my_secondary_colour_hex & "' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5'>
		<path class='main" & my_reload_image_animation & "' d='M19.933 13.041a8 8 0 1 1-9.925-8.788c3.899-1 7.935 1.007 9.425 4.747'/>
		<path class='main" & my_reload_image_animation & "' d='M20 4v5h-5'/>
	</g>
</svg>